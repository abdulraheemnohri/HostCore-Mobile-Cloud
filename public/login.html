<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostCore Mobile - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; min-height: 100vh; }
        .card { width: 100%; max-width: 400px; margin: auto; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <h2 class="text-center mb-4">HostCore Login</h2>
            <div id="alert" class="alert d-none"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
            </form>
            <div class="text-center mt-3">
                <small>Not registered? <a href="#" id="toggleRegister">Create account</a></small>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const alert = document.getElementById('alert');
        let isRegister = false;

        document.getElementById('toggleRegister').onclick = (e) => {
            e.preventDefault();
            isRegister = !isRegister;
            document.querySelector('h2').innerText = isRegister ? 'HostCore Register' : 'HostCore Login';
            document.querySelector('button').innerText = isRegister ? 'Register' : 'Login';
            e.target.innerText = isRegister ? 'Back to Login' : 'Create account';
        };

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const endpoint = isRegister ? '/api/auth/register' : '/api/auth/login';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    if (isRegister) {
                        alert.className = 'alert alert-success';
                        alert.innerText = 'Registered! Please login.';
                        alert.classList.remove('d-none');
                        isRegister = false;
                        document.querySelector('h2').innerText = 'HostCore Login';
                        document.querySelector('button').innerText = 'Login';
                        document.getElementById('toggleRegister').innerText = 'Create account';
                    } else {
                        localStorage.setItem('token', data.token);
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    alert.className = 'alert alert-danger';
                    alert.innerText = data.message;
                    alert.classList.remove('d-none');
                }
            } catch (err) {
                alert.className = 'alert alert-danger';
                alert.innerText = 'Connection error';
                alert.classList.remove('d-none');
            }
        };
    </script>
</body>
</html>
