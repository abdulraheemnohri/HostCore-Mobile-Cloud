<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostCore Pro | Database</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-color: #0d6efd; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; padding-bottom: 70px; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); height: 60px; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #333; z-index: 1000; }
        .nav-bottom a { color: #888; text-decoration: none; font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; }
        .nav-bottom a.active { color: var(--primary-color); }
        .nav-bottom a span { font-size: 0.65rem; font-weight: 600; }
        .db-card { background: var(--card-bg); border-radius: 12px; padding: 1.2rem; border: 1px solid #333; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container pt-4">
        <h4 class="fw-bold mb-4">Database <span class="text-primary">Manager</span></h4>
        <div id="status"></div>
        <form id="dbForm" class="db-card">
            <h6 class="mb-3">Create New Database</h6>
            <div class="mb-3">
                <select id="type" class="form-select bg-dark text-white border-secondary">
                    <option value="mariadb">MariaDB (MySQL)</option>
                    <option value="postgresql">PostgreSQL</option>
                </select>
            </div>
            <div class="mb-3"><input type="text" id="dbName" class="form-control bg-dark text-white border-secondary" placeholder="DB Name" required></div>
            <div class="mb-3"><input type="text" id="user" class="form-control bg-dark text-white border-secondary" placeholder="Username" required></div>
            <div class="mb-3"><input type="password" id="pass" class="form-control bg-dark text-white border-secondary" placeholder="Password" required></div>
            <button type="submit" class="btn btn-primary w-100">Create Database</button>
        </form>
    </div>

    <div class="nav-bottom">
        <a href="dashboard.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="deploy.html"><i class="fas fa-plus-circle"></i><span>Deploy</span></a>
        <a href="apps.html"><i class="fas fa-th-list"></i><span>Apps</span></a>
        <a href="db.html" class="active"><i class="fas fa-database"></i><span>DB</span></a>
        <a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script>
        const token = localStorage.getItem('token');
        async function loadStatus() {
            const res = await fetch('/api/database/status', { headers: { 'Authorization': \`Bearer \${token}\` } });
            const data = await res.json();
            document.getElementById('status').innerHTML = \`
                <div class="db-card d-flex justify-content-between">
                    <div>MariaDB: \${data.mariadb ? '<span class="text-success">Active</span>' : '<span class="text-danger">Offline</span>'}</div>
                    <div>PostgreSQL: \${data.postgresql ? '<span class="text-success">Active</span>' : '<span class="text-danger">Offline</span>'}</div>
                </div>
            \`;
        }
        document.getElementById('dbForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            try {
                const res = await fetch('/api/database/create', {
                    method: 'POST',
                    headers: { 'Authorization': \`Bearer \${token}\`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: document.getElementById('type').value,
                        name: document.getElementById('dbName').value,
                        user: document.getElementById('user').value,
                        password: document.getElementById('pass').value
                    })
                });
                const data = await res.json();
                alert(data.message);
            } catch (e) { alert('Error: ' + e.message); }
            finally { btn.disabled = false; }
        }
        loadStatus();
    </script>
</body>
</html>
