<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostCore Pro | Mobile Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-color: #0d6efd; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; padding-bottom: 70px; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); height: 60px; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #333; z-index: 1000; }
        .nav-bottom a { color: #888; text-decoration: none; font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-bottom a.active { color: var(--primary-color); }
        .nav-bottom a span { font-size: 0.65rem; font-weight: 600; }
        .stat-card { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; border: 1px solid #333; margin-bottom: 1rem; transition: 0.3s; }
        .stat-card:active { transform: scale(0.98); }
        .stat-icon { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--primary-color); }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: 0.8rem; color: #888; }
        .chart-container { background: var(--card-bg); border-radius: 12px; padding: 1rem; border: 1px solid #333; }
        .app-item { background: var(--card-bg); border-radius: 12px; padding: 1rem; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
        .app-info { display: flex; flex-direction: column; }
        .app-name { font-weight: 700; margin-bottom: 0.2rem; }
        .app-meta { font-size: 0.75rem; color: #888; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .status-running { background: #28a745; box-shadow: 0 0 8px #28a745; }
    </style>
</head>
<body>
    <div class="container pt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">HostCore <span class="text-primary">PRO</span></h4>
            <div id="statusIndicator" class="badge bg-success">Online</div>
        </div>

        <div class="row g-3 mb-2">
            <div class="col-6">
                <div class="stat-card">
                    <i class="fas fa-microchip stat-icon"></i>
                    <div class="stat-value" id="cpuVal">0%</div>
                    <div class="stat-label">CPU Load</div>
                </div>
            </div>
            <div class="col-6">
                <div class="stat-card">
                    <i class="fas fa-memory stat-icon"></i>
                    <div class="stat-value" id="memVal">0%</div>
                    <div class="stat-label">RAM Usage</div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4" id="termuxStats" style="display: none;">
            <div class="col-6">
                <div class="stat-card">
                    <i class="fas fa-battery-three-quarters stat-icon text-success"></i>
                    <div class="stat-value" id="battVal">-%</div>
                    <div class="stat-label">Battery Level</div>
                </div>
            </div>
            <div class="col-6">
                <div class="stat-card">
                    <i class="fas fa-wifi stat-icon text-info"></i>
                    <div class="stat-value" id="wifiVal">-</div>
                    <div class="stat-label">WiFi Status</div>
                </div>
            </div>
        </div>

        <h6 class="fw-bold mb-3"><i class="fas fa-rocket me-2"></i>Running Applications</h6>
        <div id="appList">
            <div class="text-center text-muted py-5">No apps running</div>
        </div>
    </div>

    <div class="nav-bottom">
        <a href="dashboard.html" class="active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="deploy.html"><i class="fas fa-plus-circle"></i><span>Deploy</span></a>
        <a href="apps.html"><i class="fas fa-th-list"></i><span>Apps</span></a>
        <a href="db.html"><i class="fas fa-database"></i><span>DB</span></a>
        <a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('stats', (data) => {
            document.getElementById('cpuVal').innerText = \`\${data.cpu.toFixed(1)}%\`;
            document.getElementById('memVal').innerText = \`\${data.mem.toFixed(1)}%\`;

            if (data.termux && data.termux.battery) {
                document.getElementById('termuxStats').style.display = 'flex';
                document.getElementById('battVal').innerText = `${data.termux.battery.percentage}%`;
                document.getElementById('wifiVal').innerText = data.termux.wifi.supplicant_state || 'Online';
            }

            const appList = document.getElementById('appList');
            if (data.apps && data.apps.length > 0) {
                appList.innerHTML = data.apps.map(app => \`
                    <div class="app-item">
                        <div class="app-info">
                            <span class="app-name">\${app.name}</span>
                            <span class="app-meta"><span class="status-dot status-running"></span>Running • \${app.cpu}% CPU</span>
                        </div>
                        <a href="/\${app.name}" target="_blank" class="btn btn-sm btn-outline-primary rounded-pill"><i class="fas fa-external-link-alt"></i></a>
                    </div>
                \`).join('');
            } else {
                appList.innerHTML = '<div class="text-center text-muted py-5">No apps running</div>';
            }
        });
    </script>
</body>
</html>
