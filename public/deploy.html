<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostCore Pro | Deploy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-color: #0d6efd; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; padding-bottom: 70px; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); height: 60px; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #333; z-index: 1000; }
        .nav-bottom a { color: #888; text-decoration: none; font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-bottom a.active { color: var(--primary-color); }
        .nav-bottom a span { font-size: 0.65rem; font-weight: 600; }
        .deploy-card { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; border: 1px solid #333; }
        .form-control, .form-select { background: #2c2c2c; border: 1px solid #444; color: #fff; border-radius: 8px; }
        .form-control:focus { background: #333; border-color: var(--primary-color); color: #fff; box-shadow: none; }
        .btn-primary { border-radius: 8px; font-weight: 600; padding: 0.8rem; }
    </style>
</head>
<body>
    <div class="container pt-4">
        <h4 class="fw-bold mb-4">Deploy <span class="text-primary">App</span></h4>

        <div class="deploy-card mb-4">
            <div id="alert" class="alert d-none"></div>
            <form id="deployForm">
                <div class="mb-3">
                    <label class="form-label small text-muted">Application Name</label>
                    <input type="text" id="appName" class="form-control" placeholder="my-app" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted">App Source (ZIP)</label>
                    <input type="file" id="appZip" class="form-control" accept=".zip" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-muted">Memory Limit (MB)</label>
                    <input type="number" id="memoryLimit" class="form-control" value="128">
                </div>
                <button type="submit" class="btn btn-primary w-100">Deploy to HostCore</button>
            </form>
        </div>

        <div class="alert alert-info border-0" style="background: rgba(13, 110, 253, 0.1); color: #7abaff;">
            <i class="fas fa-info-circle me-2"></i> Supports Node.js, Python (app.py), and Static HTML.
        </div>
    </div>

    <div class="nav-bottom">
        <a href="dashboard.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="deploy.html" class="active"><i class="fas fa-plus-circle"></i><span>Deploy</span></a>
        <a href="apps.html"><i class="fas fa-th-list"></i><span>Apps</span></a>
        <a href="db.html"><i class="fas fa-database"></i><span>DB</span></a>
        <a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script>
        document.getElementById('deployForm').onsubmit = async (e) => {
            e.preventDefault();
            const alert = document.getElementById('alert');
            const btn = e.target.querySelector('button');
            const formData = new FormData();
            formData.append('name', document.getElementById('appName').value);
            formData.append('appZip', document.getElementById('appZip').files[0]);

            btn.disabled = true;
            btn.innerText = 'Deploying...';

            try {
                const res = await fetch('/api/deploy', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: formData
                });
                const data = await res.json();
                alert.className = res.ok ? 'alert alert-success' : 'alert alert-danger';
                alert.innerText = data.message;
                alert.classList.remove('d-none');
            } catch (err) {
                alert.className = 'alert alert-danger';
                alert.innerText = 'Error: ' + err.message;
                alert.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Deploy to HostCore';
            }
        };
    </script>
</body>
</html>
