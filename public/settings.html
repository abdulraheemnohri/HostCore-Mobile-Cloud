<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostCore Pro | Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-color: #0d6efd; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; padding-bottom: 70px; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); height: 60px; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #333; z-index: 1000; }
        .nav-bottom a { color: #888; text-decoration: none; font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; }
        .nav-bottom a.active { color: var(--primary-color); }
        .nav-bottom a span { font-size: 0.65rem; font-weight: 600; }
        .settings-card { background: var(--card-bg); border-radius: 12px; padding: 1.2rem; border: 1px solid #333; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container pt-4">
        <h4 class="fw-bold mb-4">System <span class="text-primary">Settings</span></h4>

        <div class="settings-card">
            <h6>Maintenance</h6>
            <button onclick="maintenance('backup')" class="btn btn-outline-info w-100 mb-2">Run Backup</button>
            <button onclick="maintenance('wipe')" class="btn btn-outline-danger w-100">Wipe My Apps</button>
        </div>

        <div class="settings-card">
            <h6>System Info</h6>
            <div id="sysInfo" class="small text-muted">Loading...</div>
        </div>

        <button onclick="logout()" class="btn btn-danger w-100">Logout</button>
    </div>

    <div class="nav-bottom">
        <a href="dashboard.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="deploy.html"><i class="fas fa-plus-circle"></i><span>Deploy</span></a>
        <a href="apps.html"><i class="fas fa-th-list"></i><span>Apps</span></a>
        <a href="db.html"><i class="fas fa-database"></i><span>DB</span></a>
        <a href="settings.html" class="active"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script>
        const token = localStorage.getItem('token');
        async function maintenance(action) {
            if (confirm('Are you sure?')) {
                const res = await fetch(\`/api/system/maintenance/\${action}\`, { method: 'POST', headers: { 'Authorization': \`Bearer \${token}\` } });
                const data = await res.json();
                alert(data.message);
            }
        }
        async function loadSys() {
            const res = await fetch('/api/system/system/details', { headers: { 'Authorization': \`Bearer \${token}\` } });
            const data = await res.json();
            document.getElementById('sysInfo').innerHTML = \`
                <div>CPU: \${data.cpu.brand} (\${data.cpu.cores} cores)</div>
                <div>OS: \${data.os.distro} \${data.os.release}</div>
                <div>Node: \${data.node}</div>
                <div>Memory: \${(data.mem.total / 1024 / 1024 / 1024).toFixed(1)} GB</div>
            \`;
        }
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }
        loadSys();
    </script>
</body>
</html>
