<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostCore Pro | Apps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-color: #0d6efd; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; padding-bottom: 70px; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); height: 60px; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #333; z-index: 1000; }
        .nav-bottom a { color: #888; text-decoration: none; font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; }
        .nav-bottom a.active { color: var(--primary-color); }
        .nav-bottom a span { font-size: 0.65rem; font-weight: 600; }
        .app-card { background: var(--card-bg); border-radius: 12px; padding: 1.2rem; border: 1px solid #333; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container pt-4">
        <h4 class="fw-bold mb-4">Manage <span class="text-primary">Apps</span></h4>
        <div id="appsList"></div>
    </div>

    <div class="nav-bottom">
        <a href="dashboard.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="deploy.html"><i class="fas fa-plus-circle"></i><span>Deploy</span></a>
        <a href="apps.html" class="active"><i class="fas fa-th-list"></i><span>Apps</span></a>
        <a href="db.html"><i class="fas fa-database"></i><span>DB</span></a>
        <a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script>
        const token = localStorage.getItem('token');
        async function loadApps() {
            const res = await fetch('/api/apps', { headers: { 'Authorization': \`Bearer \${token}\` } });
            const apps = await res.json();
            document.getElementById('appsList').innerHTML = apps.map(app => \`
                <div class="app-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">\${app.name}</h5>
                        <span class="badge \${app.status === 'running' ? 'bg-success' : 'bg-danger'}">\${app.status}</span>
                    </div>
                    <div class="text-muted small mb-3">Port: \${app.port} • Route: \${app.route}</div>
                    <div class="d-flex gap-2">
                        <button onclick="controlApp('\${app.name}', 'start')" class="btn btn-sm btn-success flex-grow-1">Start</button>
                        <button onclick="controlApp('\${app.name}', 'stop')" class="btn btn-sm btn-warning flex-grow-1">Stop</button>
                        <button onclick="deleteApp('\${app.name}')" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            \`).join('');
        }
        async function controlApp(name, action) {
            await fetch(\`/api/apps/\${name}/\${action}\`, { method: 'POST', headers: { 'Authorization': \`Bearer \${token}\` } });
            loadApps();
        }
        async function deleteApp(name) {
            if (confirm('Delete app?')) {
                await fetch(\`/api/apps/\${name}\`, { method: 'DELETE', headers: { 'Authorization': \`Bearer \${token}\` } });
                loadApps();
            }
        }
        loadApps();
    </script>
</body>
</html>
